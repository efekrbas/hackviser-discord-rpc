<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hackviser RPC</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <img src="images/1679414162991.jpg" alt="Hackviser" class="titlebar-icon">
      <span class="titlebar-title">Hackviser RPC</span>
    </div>
    <div class="titlebar-buttons">
      <button class="titlebar-btn minimize" id="btn-minimize" title="Minimize">─</button>
      <button class="titlebar-btn tray" id="btn-tray" title="Minimize to tray">▼</button>
      <button class="titlebar-btn close" id="btn-close" title="Close">✕</button>
    </div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <div class="header">
      <div class="logo-section">
        <img src="images/1679414162991.jpg" alt="Hackviser" class="logo">
        <div class="header-text">
          <h1>HACKVISER</h1>
          <p class="subtitle">Discord Rich Presence</p>
        </div>
      </div>
    </div>

    <!-- Status Badges -->
    <div class="status-row">
      <div class="status-badge" id="discord-badge">
        <span class="status-dot"></span>
        <span class="status-text">Discord: Disconnected</span>
      </div>
      <div class="status-badge" id="chrome-badge">
        <span class="status-dot"></span>
        <span class="status-text">Chrome: Disconnected</span>
      </div>
    </div>

    <!-- Discord User Info -->
    <div class="user-info hidden" id="user-info">
      <span class="user-label" id="user-icon" style="display:flex;align-items:center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36" width="18" height="18" fill="var(--blue)">
          <path
            d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.2,46,96.09,53,91.08,65.69,84.69,65.69Z" />
        </svg>
      </span>
      <span class="user-name" id="user-name">—</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-primary" id="btn-start">
        <span class="btn-icon">▶</span>
        <span class="btn-text">Start</span>
      </button>
      <button class="btn-danger hidden" id="btn-stop">
        <span class="btn-icon">■</span>
        <span class="btn-text">Stop</span>
      </button>
    </div>

    <!-- Current Activity -->
    <div class="divider">
      <span class="divider-text">CURRENT ACTIVITY</span>
    </div>

    <div class="activity-display" id="activity-display">
      <div class="activity-icon" id="activity-icon">🌐</div>
      <div class="activity-info">
        <div class="activity-page" id="activity-page">Waiting...</div>
        <div class="activity-detail" id="activity-detail">Waiting for Chrome data</div>
      </div>
    </div>

    <!-- Page Selector (Manual) -->
    <div class="manual-section" id="manual-section">
      <div class="divider">
        <span class="divider-text">MANUAL PAGE SELECTION</span>
      </div>
      <div class="page-grid" id="page-grid"></div>
    </div>

    <!-- Preview Card -->
    <div class="divider">
      <span class="divider-text">DISCORD PREVIEW</span>
    </div>

    <div class="preview-card" id="preview-card">
      <div class="preview-header">Playing a Game</div>
      <div class="preview-body">
        <img src="images/1679414162991.jpg" alt="Hackviser" class="preview-image">
        <div class="preview-text">
          <div class="preview-name">Hackviser</div>
          <div class="preview-details" id="preview-details">Browsing Platform</div>
          <div class="preview-state" id="preview-state"></div>
          <div class="preview-time">
            <span class="preview-time-icon">🎮</span>
            <span id="preview-elapsed">0:00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
