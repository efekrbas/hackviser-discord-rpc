<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackviser RPC — Discord Authorization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #7AFF4C;
            --accent-dim: rgba(122, 255, 76, 0.12);
            --bg: #0d0f12;
            --bg-card: #1a1f2a;
            --text: #e8eaf0;
            --text-dim: #8b92a0;
            --danger: #ff4c6a;
            --success: #7AFF4C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 420px;
            padding: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 3px solid var(--accent-dim);
            box-shadow: 0 0 40px var(--accent-dim);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent), #4cff91);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .status-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .status-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .status-card.success {
            border-color: rgba(122, 255, 76, 0.2);
            box-shadow: 0 0 30px rgba(122, 255, 76, 0.06);
        }

        .status-card.success .status-title {
            color: var(--success);
        }

        .status-card.error {
            border-color: rgba(255, 76, 106, 0.2);
        }

        .status-card.error .status-title {
            color: var(--danger);
        }

        .status-card.loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(122, 255, 76, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>HACKVISER</h1>
        <p class="subtitle">Discord Rich Presence</p>

        <div class="status-card loading" id="status-card">
            <div class="spinner"></div>
            <div class="status-title">Connecting to Discord...</div>
            <div class="status-text">Please wait while we link your Discord account.</div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1476565376513999030';
        const CLIENT_SECRET = 'QPUsrB2mf4bMhxtnsnUcPKzIIeVVEm8U';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const card = document.getElementById('status-card');

        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (!code) {
                showError('No authorization code found. Please try again from the extension.');
                return;
            }

            try {
                // Exchange code for token
                const response = await fetch('https://discord.com/api/oauth2/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        client_secret: CLIENT_SECRET,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                    }),
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error_description || `HTTP ${response.status}`);
                }

                const data = await response.json();

                // Save token to localStorage so extension can read it
                localStorage.setItem('hackviser_discord_token', JSON.stringify({
                    access_token: data.access_token,
                    token_type: data.token_type,
                    refresh_token: data.refresh_token,
                    expires_at: Date.now() + (data.expires_in * 1000),
                    scope: data.scope,
                    linked: true,
                }));

                showSuccess(data.access_token);
            } catch (e) {
                showError(e.message);
            }
        }

        function showSuccess(token) {
            card.className = 'status-card success';
            card.innerHTML = `
                <div class="status-icon">✅</div>
                <div class="status-title">Discord Linked Successfully!</div>
                <div class="status-text">
                    Your Discord account has been linked to Hackviser RPC.<br>
                    You can close this tab and go back to the extension.
                </div>
            `;

            // Clean URL
            if (window.history.replaceState) {
                window.history.replaceState(null, '', window.location.pathname);
            }
        }

        function showError(message) {
            card.className = 'status-card error';
            card.innerHTML = `
                <div class="status-icon">❌</div>
                <div class="status-title">Authorization Failed</div>
                <div class="status-text">${message}</div>
            `;
        }

        handleCallback();
    </script>
</body>

</html>
